<!DOCTYPE html>
<html lang="pt-BR">
<head><style>
@font-face {
  font-family: "Optimistic";
  font-style: normal;
  font-weight: 400 600;
  font-display: swap;
  src: url("/fonts/OptimisticAI_VF_Optimized.woff2") format("woff2");
}
@font-face {
  font-family: "Optimistic Mono";
  font-style: normal;
  font-weight: 400;
  font-display: swap;
  src: url("/fonts/OptimisticMono_W_TextRegular.woff2") format("woff2");
}
:where(html) {
  font-family: "Optimistic", system-ui, sans-serif;
}
:where(code, pre, kbd, samp) {
  font-family: "Optimistic Mono", ui-monospace, monospace;
}
</style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Eagle Imports - FINAL Firebase Animado</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
body{font-family:Inter,sans-serif}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.4)}50%{box-shadow:0 0 0 12px rgba(212,175,55,0)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
@keyframes progressGrow{from{height:0}to{height:100%}}
.animate-float{animation:float 3s ease-in-out infinite}
.animate-pulse-gold{animation:pulse-gold 2s infinite}
.animate-slideUp{animation:slideUp 0.6s ease-out forwards}
.animate-checkPop{animation:checkPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
.shimmer{position:relative;overflow:hidden}
.shimmer::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);animation:shimmer 2s infinite}
</style>
</head>
<body class="bg-[#0A0A0A] text-white">
<div id="app" class="min-h-screen flex items-center justify-center"><div class="text-center p-8"><div class="w-14 h-14 bg-[#D4AF37] rounded-2xl flex items-center justify-center mx-auto mb-4 text-black font-black animate-float text-xl">🦅</div><div class="font-bold">Carregando Black Eagle...</div><div class="text-xs text-gray-500 mt-2">Firebase + Animações Premium</div></div></div>
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-white text-black px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 pointer-events-none translate-y-4 transition-all duration-300 z-[100]">Salvo ✅</div>

<script type="module">
// ========== FIREBASE CONFIG - SUA API JÁ COLOCADA ==========
const firebaseConfig = {
  apiKey: "AIzaSyDtnHkeROHVz3zKhpxCbP1q_UiQFh1RF0E",
  authDomain: "black-eagle-imports.firebaseapp.com",
  projectId: "black-eagle-imports",
  storageBucket: "black-eagle-imports.firebasestorage.app",
  messagingSenderId: "576822763640",
  appId: "1:576822763640:web:b2df13324133eca0b94d8d",
  measurementId: "G-51S6E7DY4T"
};
// Se ainda não tem o resto, me manda o print da tela do Firebase > Configurações > Seus apps > SDK
const isFirebaseConfigured = true; // Configurado com sua conta
// Se você me mandar o config completo, eu já coloco certinho
// ============================================================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, setDoc, getDoc, getDocs, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let app, db;
if(isFirebaseConfigured){
  try{
    app = initializeApp(firebaseConfig);
    db = getFirestore(app);
  }catch(e){ console.error("Firebase erro", e); }
}

const STATUSES=[
{id:1,label:"Pedido Criado",icon:"📝",desc:"Recebido pela Black Eagle"},
{id:2,label:"Pedido Feito",icon:"🛒",desc:"Comprado na origem"},
{id:3,label:"Vendedor Enviou",icon:"📦",desc:"A caminho do nosso galpão"},
{id:4,label:"Chegou no Galpão",icon:"🏭",desc:"No nosso centro de distribuição"},
{id:5,label:"Inspeção QC",icon:"📸",desc:"Fotos de qualidade disponíveis"},
{id:6,label:"Embalado p/ Brasil",icon:"🎁",desc:"Proteção reforçada"},
{id:7,label:"Enviado ao Brasil",icon:"✈️",desc:"Em trânsito internacional"},
{id:8,label:"Chegou ao Brasil",icon:"🇧🇷",desc:"No Brasil"},
{id:9,label:"Rota de Entrega",icon:"🚚",desc:"Saiu para entrega"},
{id:10,label:"Entregue",icon:"✅",desc:"Entregue com sucesso!"}
];
const STORAGE_KEY='black_eagle_firebase_animado';
const ADMIN_PASS_KEY='be_admin_pass_v1';
const ADMIN_SESSION_KEY='be_admin_session_v1';

function getCommission(v){if(v<=500)return 25;if(v<=1500)return 50;if(v<=3000)return 80;return 120;}
function formatBRL(v){return Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}
function formatWeight(val,unit){if(!val) return ''; return `${val}${unit||'kg'}`;}
function genId(){return 'BE-'+Math.floor(1000+Math.random()*9000);}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.remove('opacity-0','translate-y-4');
  t.classList.add('opacity-100','translate-y-0');
  setTimeout(()=>{t.classList.add('opacity-0','translate-y-4');t.classList.remove('opacity-100','translate-y-0');},3000);
}
function getTrackId(){
  const hash=location.hash||'';
  if(hash.includes('track=')) return hash.split('track=')[1].split('&')[0];
  const params=new URLSearchParams(location.search);
  if(params.get('track')) return params.get('track');
  return null;
}
function isAdminLogged(){return sessionStorage.getItem(ADMIN_SESSION_KEY)==='1';}
function hasAdminPass(){return !!localStorage.getItem(ADMIN_PASS_KEY);}

let orders=[], selectedId=null, showNew=false, showDel=null, showStatus=null;
let unsubscribeAdmin=null, unsubscribeClient=null;

async function loadOrdersLocal(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){
    try{
      const parsed=JSON.parse(raw);
      return Array.isArray(parsed)?parsed.map(o=>({
        ...o,
        pesoEst: typeof o.pesoEst==='object'?o.pesoEst:{value:o.pesoEst||'',unit:'kg'},
        pesoReal: typeof o.pesoReal==='object'?o.pesoReal:{value:o.pesoReal||'',unit:'kg'},
      })):[];
    }catch(e){return [];}
  }
  return [];
}
async function fetchOrders(){
  if(isFirebaseConfigured && db){
    try{
      const snap = await getDocs(collection(db, "pedidos"));
      const list=[]; snap.forEach(d=>list.push(d.data()));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
      return list;
    }catch(e){
      console.error(e);
      return await loadOrdersLocal();
    }
  }else{
    return await loadOrdersLocal();
  }
}
async function saveOrderToDB(order){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
  if(isFirebaseConfigured && db){
    try{ await setDoc(doc(db, "pedidos", order.id), order); }catch(e){console.error(e);}
  }
}
async function deleteOrderFromDB(id){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
  if(isFirebaseConfigured && db){ try{ await deleteDoc(doc(db, "pedidos", id)); }catch(e){} }
}
async function updateOrderInDB(order){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
  if(isFirebaseConfigured && db){ try{ await setDoc(doc(db, "pedidos", order.id), order, {merge:true}); }catch(e){} }
}

async function render(){
  const tid=getTrackId();
  const app=document.getElementById('app');
  if(tid){
    if(unsubscribeAdmin){unsubscribeAdmin(); unsubscribeAdmin=null;}
    if(isFirebaseConfigured && db){
      if(unsubscribeClient) unsubscribeClient();
      const docRef = doc(db, "pedidos", tid);
      try{
        const snap = await getDoc(docRef);
        if(snap.exists()){
          renderClient(snap.data(), app);
          unsubscribeClient = onSnapshot(docRef, (docSnap)=>{
            if(docSnap.exists()) renderClient(docSnap.data(), app);
          });
          return;
        }
      }catch(e){}
      const oLocal = orders.find(x=>x.id===tid);
      if(oLocal){ renderClient(oLocal,app); return; }
      app.innerHTML=`<div class="min-h-screen bg-[#0A0A0A] flex items-center justify-center p-6"><div class="bg-[#141414] border border-white/10 p-8 rounded-[28px] max-w-md w-full text-center"><div class="w-14 h-14 bg-[#D4AF37] rounded-2xl flex items-center justify-center mx-auto mb-4 text-black font-black">🦅</div><h1 class="font-black text-lg">Pedido ${tid} não encontrado</h1><p class="text-gray-400 text-sm mt-3">Crie esse pedido no painel primeiro.</p></div></div>`;
      return;
    }else{
      const o=orders.find(x=>x.id===tid);
      if(!o){ app.innerHTML=`<div class="min-h-screen bg-[#0A0A0A] flex items-center justify-center p-6"><div class="bg-[#141414] p-8 rounded-[28px] max-w-md w-full text-center"><h1 class="font-black">Pedido não encontrado</h1></div></div>`; return; }
      renderClient(o,app); return;
    }
  }
  if(!isAdminLogged()){ renderLogin(app); return; }
  if(!orders.length) orders = await fetchOrders();
  if(isFirebaseConfigured && db && !unsubscribeAdmin){
    try{
      unsubscribeAdmin = onSnapshot(collection(db, "pedidos"), (snap)=>{
        const list=[]; snap.forEach(d=>list.push(d.data()));
        orders=list; localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
        if(!selectedId && !showNew && !showDel && !showStatus) renderAdmin(document.getElementById('app'));
      });
    }catch(e){}
  }
  renderAdmin(app);
}

function renderLogin(app){
  const hasPass = hasAdminPass();
  const firebaseStatus = isFirebaseConfigured ?
    `<div class="bg-green-500/10 border border-green-500/20 rounded-xl p-3 text-[11px] text-green-300 mb-4">✅ Firebase conectado com sua API Key • Tempo real ativo</div>` :
    `<div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl p-3 text-[11px] text-yellow-300 mb-4">⚠️ Falta completar o config do Firebase<br/>Me mande o config completo ou cole aqui: authDomain, projectId, storageBucket, messagingSenderId, appId</div>`;
  app.innerHTML=`
  <div class="min-h-screen bg-[#0A0A0A] flex items-center justify-center p-6">
    <div class="bg-[#141414] border border-white/10 rounded-[28px] p-8 w-full max-w-[400px]">
      <div class="flex items-center gap-3 mb-6">
        <div class="w-12 h-12 bg-[#D4AF37] rounded-2xl flex items-center justify-center text-black font-black text-xl animate-float">🦅</div>
        <div><div class="font-black tracking-[0.2em] text-sm">BLACK EAGLE</div><div class="text-[10px] tracking-[0.25em] text-[#D4AF37]">ANIMADO • FIREBASE</div></div>
      </div>
      ${firebaseStatus}
      ${!hasPass?`
        <h1 class="font-bold text-lg mb-1">Crie sua senha</h1>
        <p class="text-[12px] text-gray-400 mb-6">Protege seu painel. Cliente não vê essa tela.</p>
        <input id="newPass" type="password" placeholder="Crie senha" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm mb-3">
        <input id="confirmPass" type="password" placeholder="Confirme" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm mb-6">
        <button onclick="window.setupPass()" class="w-full bg-[#D4AF37] text-black font-black py-3 rounded-full text-sm">Criar e entrar</button>
      `:`
        <h1 class="font-bold text-lg mb-1">Painel Blindado</h1>
        <p class="text-[12px] text-gray-400 mb-6">Digite sua senha.</p>
        <input id="loginPass" type="password" placeholder="Sua senha" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm mb-4">
        <button onclick="window.login()" class="w-full bg-white text-black font-black py-3 rounded-full text-sm">Entrar</button>
        <button onclick="window.resetPass()" class="w-full mt-3 text-[11px] text-gray-500">Resetar senha</button>
      `}
    </div>
  </div>`;
}

function renderClient(o,appEl){
  const com=getCommission(o.valor);
  const total=o.valor+com+(parseFloat(o.frete)||0);
  const hasFrete=o.frete!==''&&o.frete!=null&&o.frete!==0;
  const pesoRealStr=o.pesoReal&&o.pesoReal.value?formatWeight(o.pesoReal.value,o.pesoReal.unit):'';
  const pesoEstStr=o.pesoEst&&o.pesoEst.value?formatWeight(o.pesoEst.value,o.pesoEst.unit):'';
  const progress = (o.status/10)*100;
  const app = appEl || document.getElementById('app');
  
  // Confete se entregue
  const confetti = o.status===10 ? `<div class="absolute inset-0 pointer-events-none overflow-hidden"><div class="absolute animate-float" style="left:10%;top:10%">🎉</div><div class="absolute animate-float" style="left:80%;top:20%;animation-delay:0.5s">✨</div><div class="absolute animate-float" style="left:50%;top:5%;animation-delay:1s">🎊</div></div>` : '';

  app.innerHTML=`
  <div class="min-h-screen bg-[#0A0A0A] text-white relative overflow-hidden">
    <!-- Fundo animado sutil -->
    <div class="absolute inset-0 pointer-events-none">
      <div class="absolute top-[-20%] right-[-10%] w-[600px] h-[600px] bg-[#D4AF37]/5 rounded-full blur-[120px] animate-float"></div>
      <div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-[#D4AF37]/3 rounded-full blur-[100px] animate-float" style="animation-delay:1s"></div>
    </div>

    <div class="border-b border-white/5 bg-[#0A0A0A]/80 backdrop-blur-xl sticky top-0 z-20">
      <div class="max-w-3xl mx-auto px-6 py-5 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-[#D4AF37] rounded-xl flex items-center justify-center text-black font-black animate-float">🦅</div>
          <div><div class="font-black tracking-[0.2em] text-[13px]">BLACK EAGLE</div><div class="text-[9px] tracking-[0.35em] text-[#D4AF37] -mt-1">IMPORTS • ANIMADO</div></div>
        </div>
        <div class="text-right"><div class="text-[10px] text-gray-500 tracking-widest">PEDIDO</div><div class="font-bold text-sm tracking-widest">${o.id}</div><div class="text-[9px] text-green-400 animate-pulse">● AO VIVO • ANIMADO</div></div>
      </div>
      <!-- Barra de progresso animada -->
      <div class="h-1 bg-white/5"><div class="h-full bg-[#D4AF37] transition-all duration-1000 ease-out" style="width:${progress}%"></div></div>
    </div>

    <div class="max-w-3xl mx-auto px-6 py-8 relative z-10">
      <!-- Card principal com animação -->
      <div class="bg-[#141414] border border-white/5 rounded-[28px] p-7 md:p-8 mb-6 relative overflow-hidden shimmer animate-slideUp">
        ${confetti}
        <div class="relative">
          <div class="flex justify-between items-start mb-8">
            <div class="animate-slideUp" style="animation-delay:0.1s"><h1 class="text-[28px] font-black leading-none">Olá, ${o.cliente.split(' ')[0]}! 👋</h1><p class="text-gray-400 text-[13px] mt-2">Seu pedido está sendo rastreado em tempo real</p></div>
            <div class="bg-[#D4AF37] text-black px-4 py-2 rounded-full text-[11px] font-black tracking-widest animate-pulse-gold">${STATUSES.find(s=>s.id===o.status).label.toUpperCase()}</div>
          </div>
          
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-[#1E1E1E] border border-white/5 p-4 rounded-2xl hover:border-[#D4AF37]/20 transition-all duration-300 hover:-translate-y-1 animate-slideUp" style="animation-delay:0.2s"><div class="text-[10px] text-gray-500">PRODUTO</div><div class="font-bold mt-1">${formatBRL(o.valor)}</div></div>
            <div class="bg-[#1E1E1E] border border-white/5 p-4 rounded-2xl hover:border-[#D4AF37]/20 transition-all duration-300 hover:-translate-y-1 animate-slideUp" style="animation-delay:0.3s"><div class="text-[10px] text-gray-500">ASSESSORIA</div><div class="font-bold mt-1 text-[#D4AF37]">${formatBRL(com)}</div></div>
            <div class="bg-[#D4AF37] p-4 rounded-2xl text-black hover:scale-105 transition-transform duration-300 animate-slideUp" style="animation-delay:0.4s"><div class="text-[10px] opacity-70">TOTAL</div><div class="font-black mt-1">${hasFrete?formatBRL(total):'A DEFINIR'}</div><div class="text-[10px] opacity-70 mt-1">${hasFrete?`Frete ${formatBRL(o.frete)}`:'Após pesagem'}</div></div>
          </div>

          <div class="mt-5 flex flex-wrap gap-2 text-[12px]">
            ${pesoRealStr?`<span class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-full animate-slideUp" style="animation-delay:0.5s">⚖️ Real: <b>${pesoRealStr}</b></span>`:''}
            ${pesoEstStr?`<span class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-full animate-slideUp" style="animation-delay:0.6s">📦 Estimado: ${pesoEstStr}</span>`:''}
            ${o.rastreio?`<span class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-full animate-slideUp" style="animation-delay:0.7s">📮 ${o.rastreio}</span>`:''}
          </div>
        </div>
      </div>

      <!-- Timeline animada -->
      <div class="bg-[#141414] border border-white/5 rounded-[28px] p-7 md:p-8 mb-6 animate-slideUp" style="animation-delay:0.3s">
        <h2 class="font-black tracking-widest text-[12px] mb-8 flex items-center gap-2"><span class="w-2 h-2 bg-[#D4AF37] rounded-full animate-pulse"></span>LINHA DO TEMPO ANIMADA</h2>
        <div class="relative">
          ${STATUSES.map((s,i)=>{
            const done=s.id<=o.status,cur=s.id===o.status,date=o.datas[s.id]||'';
            const delay = 0.1 * i;
            return `<div class="flex gap-5 pb-9 relative animate-slideUp" style="animation-delay:${delay}s">
              ${s.id!==10?`<div class="absolute left-[18px] top-[40px] w-[2px] h-[calc(100%-8px)] bg-white/10 overflow-hidden"><div class="w-full bg-[#D4AF37] transition-all duration-1000" style="height:${done?'100%':'0%'};transition-delay:${delay}s"></div></div>`:''}
              <div class="w-9 h-9 rounded-full flex items-center justify-center text-[13px] shrink-0 z-10 border transition-all duration-500 ${done?'bg-[#D4AF37] border-[#D4AF37] text-black animate-checkPop':'bg-[#1E1E1E] border-white/10 text-gray-500'} ${cur?'ring-4 ring-[#D4AF37]/20 animate-pulse-gold':''}">${done?'✓':s.icon}</div>
              <div class="flex-1 -mt-1">
                <div class="flex justify-between"><span class="font-bold text-[14px] ${done?'text-white':'text-gray-500'} transition-colors">${s.label}</span><span class="text-[11px] text-gray-500">${date}</span></div>
                <div class="text-[12px] text-gray-400 mt-1">${s.desc}</div>
                ${cur?`<div class="mt-3 inline-flex items-center gap-2 bg-[#D4AF37] text-black text-[10px] font-black tracking-widest px-3 py-1.5 rounded-full animate-pulse"><span class="w-1.5 h-1.5 bg-black rounded-full animate-ping"></span>AGORA • ATUALIZANDO AO VIVO</div>`:''}
              </div>
            </div>`;
          }).join('')}
        </div>
      </div>

      ${o.fotos&&o.fotos.length?`<div class="bg-[#141414] border border-white/5 rounded-[28px] p-7 md:p-8 mb-6 animate-slideUp" style="animation-delay:0.5s"><h2 class="font-black tracking-widest text-[12px] mb-5 flex items-center gap-2">📸 FOTOS QC <span class="bg-[#D4AF37]/20 text-[#D4AF37] px-2 py-0.5 rounded-full text-[10px]">${o.fotos.length} fotos</span></h2><div class="grid grid-cols-2 md:grid-cols-3 gap-3">${o.fotos.map((f,idx)=>`<div class="group overflow-hidden rounded-2xl border border-white/5 hover:border-[#D4AF37]/30 transition-all duration-500 hover:scale-105 animate-slideUp" style="animation-delay:${0.1*idx}s"><img src="${f}" class="w-full h-44 object-cover group-hover:scale-110 transition-transform duration-700"></div>`).join('')}</div></div>`:''}

      <div class="bg-gradient-to-br from-[#1A1A1A] to-[#141414] border border-white/5 rounded-[28px] p-6 text-center animate-slideUp" style="animation-delay:0.8s">
        <div class="w-12 h-12 bg-[#D4AF37] rounded-2xl flex items-center justify-center mx-auto mb-3 text-black font-black animate-float">🦅</div>
        <div class="font-black tracking-[0.2em] text-[13px]">BLACK EAGLE IMPORTS</div>
        <div class="text-[11px] text-gray-500 mt-2">Página animada • Firebase Realtime • Atualiza sozinho ✨</div>
        <div class="mt-4 flex justify-center gap-1">${Array(5).fill(0).map((_,i)=>`<div class="w-1 h-1 bg-[#D4AF37]/50 rounded-full animate-pulse" style="animation-delay:${i*0.2}s"></div>`).join('')}</div>
      </div>
    </div>
  </div>`;
}

function renderAdmin(appEl){
  const app = appEl || document.getElementById('app');
  const totalLucro=orders.reduce((a,o)=>a+getCommission(o.valor),0);
  const noGalpao=orders.filter(o=>o.status===4||o.status===5).length;
  const sel=orders.find(o=>o.id===selectedId);
  const firebaseBadge = isFirebaseConfigured ? `<span class="bg-green-500/20 text-green-300 border border-green-500/20 px-3 py-1 rounded-full text-[10px] font-bold animate-pulse">● FIREBASE + ANIMADO</span>` : `<span class="bg-yellow-500/20 text-yellow-300 px-3 py-1 rounded-full text-[10px]">● MODO LOCAL</span>`;
  app.innerHTML=`
  <div class="max-w-[1200px] mx-auto px-4 md:px-6 py-6">
    <div class="flex justify-between items-center mb-4">
      <div class="flex items-center gap-3"><div class="w-12 h-12 bg-[#D4AF37] rounded-2xl flex items-center justify-center text-black font-black text-xl animate-float">🦅</div><div><div class="font-black tracking-[0.2em] text-sm">BLACK EAGLE IMPORTS</div><div class="text-[10px] tracking-[0.25em] text-[#D4AF37]">ANIMADO • FIREBASE</div></div></div>
      <div class="flex gap-2"><button onclick="window.openNew()" class="bg-white text-black font-bold px-5 py-3 rounded-full text-sm hover:scale-105 transition-transform">+ Novo</button><button onclick="window.logout()" class="bg-white/10 px-4 py-3 rounded-full text-xs">Sair</button></div>
    </div>

        ${filtered().length?filtered().map(o=>{

          return `<div class="p-5 hover:bg-white/[0.02] flex justify-between items-center cursor-pointer group" onclick="window.selOrder('${o.id}')"><div class="flex gap-4 items-center"><div class="w-10 h-10 bg-[#1A1A1A] rounded-full flex items-center justify-center group-hover:scale-110 transition-transform">${st.icon}</div><div><div class="flex gap-2 items-center"><span class="font-bold text-sm">${o.id}</span><span class="text-[11px] px-2 py-0.5 rounded-full bg-white/10">${st.label}</span></div><div class="text-sm text-gray-300">${o.cliente} • ${formatBRL(o.valor)} <span class="text-[#D4AF37]">+${formatBRL(com)}</span> • ${formatWeight(o.pesoEst?.value,o.pesoEst?.unit)}</div></div></div><div class="flex gap-2"><button onclick="event.stopPropagation();window.copyLink('${o.id}')" class="bg-[#D4AF37] text-black text-xs font-bold px-4 py-2 rounded-full hover:scale-105 transition-transform">🔗 Link</button><button onclick="event.stopPropagation();window.askDel('${o.id}')" class="bg-white/5 text-xs px-3 py-2 rounded-full">🗑️</button></div></div>`;
        }).join(''):`<div class="p-12 text-center text-gray-500 text-sm">Nenhum pedido.</div>`}
      </div>
    </div>
  </div>
  ${sel?`
  <div class="fixed inset-0 z-50 flex justify-end"><div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="window.closeDet()"></div><div class="relative w-full max-w-[520px] bg-[#141414] h-full overflow-y-auto border-l border-white/10 p-6">
    <div class="flex justify-between mb-6"><div><div class="font-black text-lg">${sel.id}</div><div class="text-sm text-gray-400">${sel.cliente}</div></div><button onclick="window.closeDet()" class="w-8 h-8 bg-white/10 rounded-full">✕</button></div>
    <div class="bg-[#0A0A0A] rounded-2xl p-4 mb-6">
      <div class="grid grid-cols-2 gap-3 text-sm">

      </div>

    <div class="mb-6"><label class="text-[11px] text-gray-500">FOTOS QC</label><div class="grid grid-cols-3 gap-2 mt-2">${sel.fotos.map((f,i)=>`<div class="relative group"><img src="${f}" class="w-full h-24 object-cover rounded-xl group-hover:scale-105 transition-transform"><button onclick="window.remFoto('${sel.id}',${i})" class="absolute -top-2 -right-2 bg-red-500 w-6 h-6 rounded-full text-xs">✕</button></div>`).join('')}</div><input type="file" id="fInput" multiple accept="image/*" class="mt-3 text-xs w-full"><button onclick="window.upFoto('${sel.id}')" class="mt-2 w-full bg-white/10 py-2 rounded-full text-xs">Adicionar Fotos</button></div>
    <div class="mb-6"><label class="text-[11px] text-gray-500">MENSAGENS</label><div class="mt-2 space-y-2"><button onclick="window.gen('${sel.id}','link')" class="w-full text-left bg-[#1A1A1A] p-3 rounded-xl text-xs hover:bg-[#222] transition-colors">🔗 Link animado tempo real</button></div><textarea id="msgOut" class="mt-3 w-full bg-black border border-white/10 rounded-xl p-3 text-xs h-28"></textarea><button onclick="window.copyMsg()" class="mt-2 w-full bg-[#25D366] text-black font-bold py-2 rounded-full text-xs">Copiar WhatsApp</button></div>

  </div></div>`:''}
  ${showNew?`<div class="fixed inset-0 z-[60] flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/70" onclick="window.closeNew()"></div><div class="relative bg-[#141414] border border-white/10 rounded-[24px] p-6 w-full max-w-md"><h2 class="font-bold text-lg mb-4">+ Novo Pedido</h2><div class="space-y-3"><input id="nc" type="text" placeholder="Nome Cliente*" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm"><input id="nw" type="tel" inputmode="numeric" placeholder="WhatsApp*" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm"><input id="nl" type="text" placeholder="Link produto" class="w-full bg-black border border-white/10 rounded-xl px-4 py-3 text-sm"><div><label class="text-[10px] text-gray-500 uppercase">VALOR (R$)</label><div class="flex mt-1"><span class="bg-[#1A1A1A] border border-white/10 px-3 py-3 rounded-l-xl text-xs font-bold">R$</span><input id="nv" type="number" inputmode="decimal" step="0.01" placeholder="890,00" class="w-full bg-black border border-white/10 rounded-r-xl px-4 py-3 text-sm"></div></div><div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] text-gray-500">PESO EST.</label><input id="npVal" type="number" inputmode="decimal" placeholder="200" class="w-full bg-black border border-white/10 rounded-xl px-3 py-3 text-sm mt-1"></div><div><label class="text-[10px] text-gray-500">UNIDADE</label><select id="npUnit" class="w-full bg-black border border-white/10 rounded-xl px-3 py-3 text-sm mt-1"><option value="kg">kg</option><option value="g" selected>g</option></select></div></div><div id="cp" class="text-xs text-[#D4AF37] bg-[#D4AF37]/10 p-3 rounded-xl">Digite valor</div></div><div class="flex gap-2 mt-6"><button onclick="window.closeNew()" class="flex-1 bg-white/10 py-3 rounded-full">Cancelar</button><button onclick="window.createOrd()" class="flex-1 bg-[#D4AF37] text-black font-bold py-3 rounded-full">Criar</button></div></div></div>`:''}
  ${showDel?`<div class="fixed inset-0 z-[70] flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/70" onclick="window.cancelDel()"></div><div class="relative bg-[#141414] border border-red-500/20 rounded-[24px] p-6 w-full max-w-sm text-center"><h3 class="font-bold mb-2">Apagar ${showDel}?</h3><div class="flex gap-2 mt-6"><button onclick="window.cancelDel()" class="flex-1 bg-white/10 py-3 rounded-full">Cancelar</button><button onclick="window.delOrd('${showDel}')" class="flex-1 bg-red-500 text-white font-bold py-3 rounded-full">Apagar</button></div></div></div>`:''}
  ${showStatus?`<div class="fixed inset-0 z-[70] flex items-center justify-center p-4"><div class="absolute inset-0 bg-black/70" onclick="window.cancelSt()"></div><div class="relative bg-[#141414] border border-[#D4AF37]/20 rounded-[24px] p-6 w-full max-w-sm text-center"><h3 class="font-bold mb-2">Confirmar?</h3><p class="text-sm text-gray-400 mb-2">De <b>${STATUSES.find(s=>s.id===orders.find(o=>o.id===showStatus.id)?.status)?.label}</b> para <b>${STATUSES.find(s=>s.id===showStatus.ns)?.label}</b></p><div class="flex gap-2 mt-6"><button onclick="window.cancelSt()" class="flex-1 bg-white/10 py-3 rounded-full">Cancelar</button><button onclick="window.applySt()" class="flex-1 bg-[#D4AF37] text-black font-bold py-3 rounded-full">Confirmar</button></div></div></div>`:''}
  `;
  const nv=document.getElementById('nv');
  if(nv)nv.addEventListener('input',e=>{const v=parseFloat(e.target.value)||0;const c=getCommission(v);document.getElementById('cp').innerHTML=v>0?`Valor ${formatBRL(v)} → Comissão <b>${formatBRL(c)}</b>`:'Digite valor';});
}
function filtered(){const q=(document.getElementById('search')?.value||'').toLowerCase();if(!q)return orders.slice().reverse();return orders.filter(o=>o.cliente.toLowerCase().includes(q)||o.id.toLowerCase().includes(q)).reverse();}

window.selOrder=(id)=>{selectedId=id;render();};
window.closeDet=()=>{selectedId=null;render();};
window.openNew=()=>{showNew=true;render();};
window.closeNew=()=>{showNew=false;render();};
window.setupPass=()=>{
  const p1=document.getElementById('newPass').value;
  const p2=document.getElementById('confirmPass').value;
  if(!p1||p1.length<4){showToast('Senha curta');return;}
  if(p1!==p2){showToast('Senhas diferentes');return;}
  localStorage.setItem(ADMIN_PASS_KEY,btoa(p1));
  sessionStorage.setItem(ADMIN_SESSION_KEY,'1');
  showToast('🔒 Painel blindado');
  render();
};
window.login=()=>{
  const p=document.getElementById('loginPass').value;
  const saved=localStorage.getItem(ADMIN_PASS_KEY);
  if(saved && btoa(p)===saved){sessionStorage.setItem(ADMIN_SESSION_KEY,'1');showToast('✅ Liberado');render();}else{showToast('❌ Senha incorreta');}
};
window.resetPass=()=>{if(confirm('Resetar senha?')){localStorage.removeItem(ADMIN_PASS_KEY);sessionStorage.removeItem(ADMIN_SESSION_KEY);render();}};
window.logout=()=>{sessionStorage.removeItem(ADMIN_SESSION_KEY);if(unsubscribeAdmin){unsubscribeAdmin();unsubscribeAdmin=null;}render();showToast('Sessão encerrada');};
window.createOrd=async()=>{
  const c=document.getElementById('nc').value.trim();
  const w=document.getElementById('nw').value.trim().replace(/\D/g,'');
  const l=document.getElementById('nl').value.trim();
  const v=parseFloat(document.getElementById('nv').value);
  const pv=document.getElementById('npVal').value.trim();
  const pu=document.getElementById('npUnit').value;
  if(!c||!w||!v){showToast('Preencha nome, whats e valor');return;}
  const id=genId();const now=new Date().toLocaleString('pt-BR');
  const newOrder={id,cliente:c,whatsapp:w,link:l,valor:v,pesoEst:{value:pv,unit:pu},status:1,pesoReal:{value:'',unit:'kg'},frete:'',rastreio:'',fotos:[],datas:{1:now}};
  orders.push(newOrder); await saveOrderToDB(newOrder);
  showNew=false;selectedId=id;render();showToast('✅ Pedido '+id+' salvo!');setTimeout(()=>window.copyLink(id),500);
};
window.askDel=(id)=>{showDel=id;render();};
window.cancelDel=()=>{showDel=null;render();};
window.delOrd=async(id)=>{orders=orders.filter(o=>o.id!==id); await deleteOrderFromDB(id); showDel=null;if(selectedId===id)selectedId=null;render();showToast('Apagado');};
window.askSt=(id)=>{const ns=parseInt(document.getElementById('selSt').value);const cur=orders.find(o=>o.id===id).status;if(ns===cur){showToast('Já está nesse status');return;}showStatus={id,ns};render();};
window.cancelSt=()=>{showStatus=null;render();};
window.applySt=async()=>{const {id,ns}=showStatus;const o=orders.find(o=>o.id===id);o.status=ns;o.datas[ns]=new Date().toLocaleString('pt-BR');await updateOrderInDB(o);showStatus=null;render();showToast('✅ Status atualizado em tempo real!');};
window.saveExtra=async(id)=>{const o=orders.find(o=>o.id===id);o.valor=parseFloat(document.getElementById('valorProd').value)||o.valor;o.pesoReal={value:document.getElementById('prVal').value,unit:document.getElementById('prUnit').value};o.frete=document.getElementById('fr').value;o.rastreio=document.getElementById('rt').value;await updateOrderInDB(o);render();showToast('💾 Salvo! Cliente vê animação na hora');};
window.upFoto=(id)=>{const inp=document.getElementById('fInput');const o=orders.find(o=>o.id===id);if(!inp.files.length){showToast('Selecione fotos');return;}Array.from(inp.files).forEach(f=>{const r=new FileReader();r.onload=async(e)=>{o.fotos.push(e.target.result);await updateOrderInDB(o);render();showToast('📸 Foto adicionada!');};r.readAsDataURL(f);});};
window.remFoto=async(id,i)=>{const o=orders.find(o=>o.id===id);o.fotos.splice(i,1);await updateOrderInDB(o);render();showToast('Foto removida');};
window.copyLink=(id)=>{const base=location.href.split('#')[0].split('?')[0];const url=base+'#track='+id;if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link animado copiado!')).catch(()=>{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('🔗 Copiado!');});}else{prompt('Copie:',url);}};
window.openPrev=(id)=>{location.hash='track='+id;render();};
window.gen=(id,type)=>{const o=orders.find(o=>o.id===id);const base=location.href.split('#')[0].split('?')[0];const link=base+'#track='+id;const com=getCommission(o.valor);const total=o.frete?formatBRL(o.valor+com+parseFloat(o.frete)):'a definir';const nome=o.cliente.split(' ')[0];const pesoStr=o.pesoReal&&o.pesoReal.value?formatWeight(o.pesoReal.value,o.pesoReal.unit):'a definir';let msg='';if(type==='link')msg=`Olá ${nome}! 🦅 Black Eagle Imports\n\nSeu pedido ${o.id} está no sistema! Link animado em tempo real:\n\n🔗 ${link}\n\nPeso, frete, fotos e status com animações aparecem lá automaticamente ✨`;else if(type==='galpao')msg=`Chegou! 📦 ${nome}, seu pedido ${o.id} chegou no galpão.\n\n⚖️ Peso real: ${pesoStr}\n💰 Frete: ${o.frete?formatBRL(o.frete):'a definir'}\n💵 Total: ${total}\n\nAcompanhe no link animado:\n${link}`;document.getElementById('msgOut').value=msg;};
window.copyMsg=()=>{const t=document.getElementById('msgOut');if(!t.value){showToast('Gere mensagem');return;}navigator.clipboard.writeText(t.value).then(()=>showToast('Copiado!')).catch(()=>{});const o=orders.find(x=>x.id===selectedId);if(o) window.open(`https://wa.me/${o.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(t.value)}`,'_blank');};
window.render=render;
window.filtered=filtered;
window.addEventListener('hashchange',render);
(async()=>{orders=await fetchOrders();render();})();
</script>
<script>(function(){var loc=location.href.replace(/#.*$/,"");var ATTR_NAMES=["data-product-id","data-productid","data-product_id","product-id","productid","product_id","data-source-entity-id","source-entity-id","source_entity_id","data-product","data-metadata","data-meta"];var DATASET_KEYS=["productId","productid","product_id","sourceEntityId","sourceentityid","source_entity_id","product","metadata","meta"];function readProductId(value){if(typeof value!=="string"||value.length===0)return null;if(/^[0-9]{6,}$/.test(value))return value;var match=value.match(/(?:product(?:_|-)?id|source(?:_|-)?entity(?:_|-)?id)["'=:\s]+([0-9]{6,})/i);return match?match[1]:null}function extractProductId(start){for(var node=start;node&&node!==document.body;node=node.parentElement){for(var i=0;i<ATTR_NAMES.length;i++){var attrValue=node.getAttribute&&node.getAttribute(ATTR_NAMES[i]);var attrProductId=readProductId(attrValue);if(attrProductId)return attrProductId}var dataset=node.dataset||null;if(dataset){for(var j=0;j<DATASET_KEYS.length;j++){var dataValue=dataset[DATASET_KEYS[j]];var dataProductId=readProductId(dataValue);if(dataProductId)return dataProductId}}}return null}function isInlineMediaSlotElement(node){return !!(node&&node.getAttribute&&node.getAttribute("data-clippy-inline-media-slot")!==null)}function findInlineMediaSlot(start){for(var node=start;node&&node!==document.body;node=node.parentElement){if(isInlineMediaSlotElement(node))return node}return null}function readInlineMediaUrl(node){if(!node)return null;return node.getAttribute&&((node.getAttribute("data-clippy-inline-media-url")||node.getAttribute("data-url")||node.getAttribute("data_url")))||node.href||null}function stripHash(url){return String(url).replace(/#.*$/,"")}function urlsMatch(a,b){if(!a||!b)return false;try{return stripHash(new URL(a,loc).href)===stripHash(new URL(b,loc).href)}catch(_){return stripHash(a)===stripHash(b)}}function isFirstPartyReelUrl(value){try{var url=new URL(value,loc);if(url.protocol!=="https:")return false;var host=url.hostname.toLowerCase();var supported=host==="instagram.com"||host.endsWith(".instagram.com")||host==="facebook.com"||host.endsWith(".facebook.com");return supported&&/\/reels?\//i.test(url.pathname)}catch(_){return false}}function isInlineMediaUrlClick(node,href){var slot=findInlineMediaSlot(node);if(!slot)return false;var slotUrl=readInlineMediaUrl(slot);if(slotUrl)return urlsMatch(href,slotUrl);return isFirstPartyReelUrl(href)}function findDataHref(start){for(var node=start;node&&node!==document.body;node=node.parentElement){if(node.getAttribute){var href=node.getAttribute("data-href")||node.getAttribute("data-url");if(href)return{href:href,node:node}}}return null}var nativeOpen=window.open;window.open=function(url){if(parent!==window&&typeof url==="string"&&/^https?:\/\//.test(url)){parent.postMessage({type:"ecto:usercontent-link-click",href:url},"*");return null}return nativeOpen?nativeOpen.apply(window,arguments):null};document.addEventListener("click",function(e){var target=e.target instanceof Element?e.target:null;if(!target)return;if(parent===window)return;var a=target.closest?target.closest("a[href]"):null;if(a&&a.href&&/^https?:\/\//.test(a.href)&&a.href.replace(/#.*$/,"")!==loc){if(isInlineMediaUrlClick(a,a.href))return;var productId=extractProductId(target)||extractProductId(a);if(productId){e.preventDefault();parent.postMessage({type:"ecto-artifact-link-click",productId:productId},"*");return}e.preventDefault();parent.postMessage({type:"ecto:usercontent-link-click",href:a.href},"*");return}var dataHref=findDataHref(target);if(dataHref&&/^https?:\/\//.test(dataHref.href)&&dataHref.href.replace(/#.*$/,"")!==loc){if(isInlineMediaUrlClick(dataHref.node,dataHref.href))return;e.preventDefault();parent.postMessage({type:"ecto:usercontent-link-click",href:dataHref.href},"*")}},true)})();</script><script>(function(){var FOCUS_TYPE="ecto:artifact-focus-request";var CLOSE_TYPE="ecto:artifact-close-request";function focusArtifactDocument(){var body=document.body;if(!body)return;try{window.focus();}catch(e){}if(!body.hasAttribute("tabindex"))body.setAttribute("tabindex","-1");try{body.focus({preventScroll:true});}catch(e){try{body.focus();}catch(e2){}}}window.addEventListener("message",function(event){if(event.source!==window.parent)return;var data=event.data;if(!data||typeof data!=="object"||data.type!==FOCUS_TYPE)return;if(document.readyState==="loading"){document.addEventListener("DOMContentLoaded",focusArtifactDocument,{once:true});return;}focusArtifactDocument();});window.addEventListener("keydown",function(event){if(event.key!=="Escape")return;window.setTimeout(function(){if(event.defaultPrevented)return;window.parent.postMessage({type:CLOSE_TYPE},"*");},0);});})();</script></body>
