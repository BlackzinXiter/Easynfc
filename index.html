<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Comprovante</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

<h1>Gerador de Comprovante</h1>
<p class="subtitulo">Preencha os dados abaixo.</p>

<div class="card">

<h2>Empresa</h2>

<input type="text" id="empresa" placeholder="Nome da empresa">

<h2>Cliente</h2>

<input type="text" id="cliente" placeholder="Nome do cliente">

<h2>Produto</h2>

<input type="text" id="produto" placeholder="Nome do produto">

<textarea id="descricao" placeholder="Descrição"></textarea>

<div class="linha">

<input type="number" id="quantidade" placeholder="Quantidade">

<input type="number" id="valor" placeholder="Valor Unitário">

</div>

<h2>Frete</h2>

<select id="freteOpcao">
<option value="nao">Sem Frete</option>
<option value="sim">Com Frete</option>
</select>

<input type="number" id="frete" placeholder="Valor do frete" style="display:none;">

<button id="gerar">
Gerar Comprovante
</button>

</div>

<div id="nota" class="nota" style="display:none;">

<h2>COMPROVANTE DE VENDA</h2>

<hr>

<p><strong>Empresa:</strong> <span id="rEmpresa"></span></p>

<p><strong>Cliente:</strong> <span id="rCliente"></span></p>

<hr>

<table>

<tr>

<th>Produto</th>

<th>Qtd</th>

<th>Valor</th>

</tr>

<tr>

<td id="rProduto"></td>

<td id="rQtd"></td>

<td id="rValor"></td>

</tr>

</table>

<p id="rDescricao"></p>

<hr>

<p><strong>Frete:</strong> <span id="rFrete"></span></p>

<h3>Total: <span id="rTotal"></span></h3>

<button onclick="window.print()">
🖨️ Imprimir / Salvar em PDF
</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
